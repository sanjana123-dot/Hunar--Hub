# Server
server.port=${PORT:8080}

# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Database — either set SPRING_DATASOURCE_URL to a full JDBC URL (jdbc:postgresql://…),
# or leave it unset and provide PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD (typical Railway Postgres).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
